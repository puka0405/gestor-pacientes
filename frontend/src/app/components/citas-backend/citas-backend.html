<div class="container mt-4">

  <h2 class="mb-4">Citas</h2>

  <!-- FORM -->
  <div class="card mb-4">

    <div class="card-header">
      {{ editingId ? 'Editar Cita' : 'Nueva Cita' }}
    </div>

    <div class="card-body">

      <form [formGroup]="form" (ngSubmit)="save()">

        <div class="row">

          <div class="col-md-6 mb-3">
            <label>Fecha y hora</label>
            <input type="datetime-local" class="form-control" formControlName="fecha_hora">
          </div>

          <div class="col-md-6 mb-3">
            <label>Estado</label>
            <select class="form-control" formControlName="estado">
              <option value="pendiente">Pendiente</option>
              <option value="completada">Completada</option>
              <option value="cancelada">Cancelada</option>
            </select>
          </div>

          <div class="col-12 mb-3">
            <label>Motivo</label>
            <input class="form-control" formControlName="motivo">
          </div>

          <div class="col-md-6 mb-3">
            <label>Paciente</label>
            <select class="form-control" formControlName="paciente_id">
              <option *ngFor="let p of pacientes" [value]="p.id">
                {{ p.nombre }} {{ p.apellido }}
              </option>
            </select>
          </div>

          <div class="col-md-6 mb-3">
            <label>Doctor</label>
            <select class="form-control" formControlName="doctor_id">
              <option *ngFor="let d of doctores" [value]="d.id">
                {{ d.nombre }} {{ d.apellido }}
              </option>
            </select>
          </div>

        </div>

        <button class="btn btn-primary">
          {{ editingId ? 'Actualizar' : 'Guardar' }}
        </button>

        <button *ngIf="editingId" type="button" class="btn btn-secondary ms-2" (click)="reset()">
          Cancelar
        </button>

      </form>

    </div>
  </div>

  <!-- TABLE -->
  <div class="card">

    <div class="card-header">
      Lista de Citas
    </div>

    <div class="card-body p-0">

      <table class="table table-striped mb-0">

        <thead class="table-dark">
          <tr>
            <th>Fecha</th>
            <th>Motivo</th>
            <th>Estado</th>
            <th>Paciente</th>
            <th>Doctor</th>
            <th></th>
          </tr>
        </thead>

        <tbody>

          <tr *ngFor="let c of citas">
            <td>{{ c.fecha_hora }}</td>
            <td>{{ c.motivo }}</td>
            <td>{{ c.estado }}</td>
            <td>{{ getPacienteNombre(c.paciente_id) }}</td>
            <td>{{ getDoctorNombre(c.doctor_id) }}</td>
            <td>
              <button class="btn btn-warning btn-sm me-2" (click)="edit(c)">Editar</button>
              <button class="btn btn-danger btn-sm" (click)="delete(c.id)">Eliminar</button>
            </td>
          </tr>

          <tr *ngIf="citas.length === 0">
            <td colspan="6" class="text-center py-3">Sin citas</td>
          </tr>

        </tbody>

      </table>

    </div>
  </div>

</div>
