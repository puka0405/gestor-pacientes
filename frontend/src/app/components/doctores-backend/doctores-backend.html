<div class="container mt-4">

  <!-- Título -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Doctores</h2>
  </div>

  <!-- Formulario -->
  <div class="card mb-4">
    <div class="card-header">
      <h5 class="mb-0">
        {{ editingId ? 'Editar Doctor' : 'Nuevo Doctor' }}
      </h5>
    </div>

    <div class="card-body">
      <form [formGroup]="form" (ngSubmit)="save()">

        <div class="row">

          <div class="col-md-6 mb-3">
            <label class="form-label">Nombre</label>
            <input class="form-control" formControlName="nombre" />
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label">Apellido</label>
            <input class="form-control" formControlName="apellido" />
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label">Especialidad</label>
            <input class="form-control" formControlName="especialidad" />
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label">Email</label>
            <input class="form-control" type="email" formControlName="email" />
          </div>

        </div>

        <div class="d-flex gap-2">
          <button class="btn btn-primary" type="submit">
            {{ editingId ? 'Actualizar' : 'Guardar' }}
          </button>

          <button
            *ngIf="editingId"
            type="button"
            class="btn btn-secondary"
            (click)="reset()"
          >
            Cancelar
          </button>
        </div>

      </form>
    </div>
  </div>

  <!-- Tabla -->
  <div class="card">
    <div class="card-header">
      <h5 class="mb-0">Lista de Doctores</h5>
    </div>

    <div class="card-body p-0">

      <div class="table-responsive">
        <table class="table table-striped table-hover mb-0">

          <thead class="table-dark">
            <tr>
              <th>Nombre</th>
              <th>Apellido</th>
              <th>Especialidad</th>
              <th>Email</th>
              <th class="text-end">Acciones</th>
            </tr>
          </thead>

          <tbody>
            <tr *ngFor="let d of doctores">
              <td>{{ d.nombre }}</td>
              <td>{{ d.apellido }}</td>
              <td>{{ d.especialidad }}</td>
              <td>{{ d.email }}</td>
              <td class="text-end">
                <button class="btn btn-sm btn-warning me-2" (click)="edit(d)">
                  Editar
                </button>

                <button class="btn btn-sm btn-danger" (click)="delete(d.id)">
                  Eliminar
                </button>
              </td>
            </tr>

            <tr *ngIf="doctores.length === 0">
              <td colspan="5" class="text-center py-4">
                No hay doctores registrados
              </td>
            </tr>

          </tbody>

        </table>
      </div>

    </div>
  </div>

</div>
