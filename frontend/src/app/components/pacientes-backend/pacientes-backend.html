<div class="container mt-4">

  <h2 class="mb-4">Pacientes</h2>

  <!-- FORM -->
  <div class="card mb-4">
    <div class="card-header">
      {{ editingId ? 'Editar Paciente' : 'Nuevo Paciente' }}
    </div>

    <div class="card-body">
      <form [formGroup]="form" (ngSubmit)="save()">

        <div class="row">

          <div class="col-md-6 mb-3">
            <label>Nombre</label>
            <input class="form-control" formControlName="nombre">
          </div>

          <div class="col-md-6 mb-3">
            <label>Apellido</label>
            <input class="form-control" formControlName="apellido">
          </div>

          <div class="col-md-6 mb-3">
            <label>Fecha nacimiento</label>
            <input type="date" class="form-control" formControlName="fecha_nac">
          </div>

          <div class="col-md-6 mb-3">
            <label>Email</label>
            <input type="email" class="form-control" formControlName="email">
          </div>

          <div class="col-12 mb-3">
            <label>Teléfono</label>
            <input class="form-control" formControlName="telefono">
          </div>

        </div>

        <button class="btn btn-primary" type="submit">
          {{ editingId ? 'Actualizar' : 'Guardar' }}
        </button>

        <button *ngIf="editingId" type="button" class="btn btn-secondary ms-2" (click)="reset()">
          Cancelar
        </button>

      </form>
    </div>
  </div>

  <!-- TABLE -->
  <div class="card">

    <div class="card-header">
      Lista de Pacientes
    </div>

    <div class="card-body p-0">

      <table class="table table-striped mb-0">
        <thead class="table-dark">
          <tr>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>Fecha Nac.</th>
            <th>Email</th>
            <th>Teléfono</th>
            <th></th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let p of pacientes">
            <td>{{ p.nombre }}</td>
            <td>{{ p.apellido }}</td>
            <td>{{ p.fecha_nac }}</td>
            <td>{{ p.email }}</td>
            <td>{{ p.telefono }}</td>
            <td>
              <button class="btn btn-warning btn-sm me-2" (click)="edit(p)">Editar</button>
              <button class="btn btn-danger btn-sm" (click)="delete(p.id)">Eliminar</button>
            </td>
          </tr>

          <tr *ngIf="pacientes.length === 0">
            <td colspan="6" class="text-center py-3">Sin pacientes</td>
          </tr>
        </tbody>

      </table>

    </div>
  </div>

</div>
